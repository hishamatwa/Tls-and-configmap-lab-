apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-tls-app
  namespace: nginx-tls
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-tls-app
  template:
    metadata:
      labels:
        app: nginx-tls-app
    spec:
      containers:
      - name: nginx
        image: nginx
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 443
        volumeMounts:
        - name: tls-files
          mountPath: /etc/nginx/tls
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: tls-files
        secret:
          secretName: nginx-tls-secret
      - name: nginx-config
        configMap:
          name: nginx-tls-config
